name: Tweet Auto Poster
on:
  schedule:
    - cron: '0,20,40 * * * *'
  workflow_dispatch:
jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install tweepy requests
      - name: Run post scheduler
        env:
          AZABU_API_KEY: ${{ secrets.AZABU_API_KEY }}
          AZABU_API_SECRET: ${{ secrets.AZABU_API_SECRET }}
          AZABU_ACCESS_TOKEN: ${{ secrets.AZABU_ACCESS_TOKEN }}
          AZABU_ACCESS_TOKEN_SECRET: ${{ secrets.AZABU_ACCESS_TOKEN_SECRET }}
          RYUUZEN_API_KEY: ${{ secrets.RYUUZEN_API_KEY }}
          RYUUZEN_API_SECRET: ${{ secrets.RYUUZEN_API_SECRET }}
          RYUUZEN_ACCESS_TOKEN: ${{ secrets.RYUUZEN_ACCESS_TOKEN }}
          RYUUZEN_ACCESS_TOKEN_SECRET: ${{ secrets.RYUUZEN_ACCESS_TOKEN_SECRET }}
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GH_REPO: ${{ github.repository }}
        run: python scripts/post_tweet.py
